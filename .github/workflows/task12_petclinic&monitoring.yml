name: Deploy Petclinic and Monitoring Services
on:
  push: 
    paths:
      - 'Task12/docker-compose-app,db.yml'
      - 'Task12/docker-compose-monitoring.yml'
      - 'Task12/prometheus.yml'
      - 'Task12/Dockerfile'
    branches:
      - main  
  workflow_dispatch:  

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Run SonarQube analysis with Maven
      working-directory: Task12/spring-petclinic_files
      run: mvn clean verify sonar:sonar -Dsonar.projectKey=spring-petclinic
      env:
        GITHUB_TOKEN: ${{ secrets.HUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          
  Build_Push_Docker_Image:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
        
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: ./Task12
        file: ./Task12/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/github_spring-petclinic:${{ github.sha }}

    - name: Notify Slack on Success
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: github_action
        SLACK_COLOR: good
        SLACK_MESSAGE: |
          SpringPetclinic Image build successful.
          Commit: ${{ github.sha }}
          Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
    - name: Notify Slack on Failure
      if: failure() 
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: github_action
        SLACK_COLOR: danger
        SLACK_MESSAGE: |
          SpringPetclinic Image Failed to Build.
          Commit: ${{ github.sha }}
          Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy-petclinic:
    runs-on: ubuntu-latest
    needs: Build_Push_Docker_Image

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Update image tag in docker-compose file
      run: |
        sed -i "s|image: .*/github_spring-petclinic:.*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/github_spring-petclinic:${{ github.sha }}|g" Task12/docker-compose-app,db.yml

    - name: Down existing containers
      run: docker compose -f Task12/docker-compose-app,db.yml down || true
        
    - name: Run Spring Petclinic application
      run: docker compose -f Task12/docker-compose-app,db.yml up -d
        
    - name: Check running containers
      run: docker compose -f Task12/docker-compose-app,db.yml ps
        
    - name: Notify Slack on Success
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: github_action
        SLACK_COLOR: good
        SLACK_MESSAGE: |
          SpringPetclinic Application is running.
          Commit: ${{ github.sha }}
          Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
    - name: Notify Slack on Failure
      if: failure() 
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: github_action
        SLACK_COLOR: danger
        SLACK_MESSAGE: |
          SpringPetclinic Application Failed to run.
          Commit: ${{ github.sha }}
          Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy-monitoring:
    runs-on: ubuntu-latest
    needs: deploy-petclinic
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
  
    - name: Down existing containers
      run: docker compose -f Task12/docker-compose-monitoring.yml down || true
        
    - name: Run monitoring applications
      run: docker compose -f Task12/docker-compose-monitoring.yml up -d
        
    - name: Notify Slack on Success
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: github_action
        SLACK_COLOR: good
        SLACK_MESSAGE: |
          Monitoring Applications are running.
          Commit: ${{ github.sha }}
          Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        
    - name: Notify Slack on Failure
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_CHANNEL: github_action
        SLACK_COLOR: danger
        SLACK_MESSAGE: |
          Monitoring Applications Failed to run.
          Commit: ${{ github.sha }}
          Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
